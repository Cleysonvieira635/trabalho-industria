<!-- dashboard.html -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - InfraSmart</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Ícones -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<main class="conteudo">

    <!-- TOPO -->
    <header class="topo">

        <div>
            <h1>Painel Dashboard</h1>
            <p>Monitoramento geral do sistema</p>
        </div>

        <div class="usuario">

            <a href="../telainicial/index.html" class="btn-voltar">
                <i class="fas fa-house"></i>
                Voltar ao Início
            </a>

            <i class="fas fa-user-circle"></i>
            <span>Administrador</span>

            <button onclick="logout()">
                Sair
            </button>

        </div>

    </header>



    <!-- CARDS -->
    <section class="cards">

        <div class="card azul">
            <i class="fas fa-building"></i>
            <div>
                <h3>Total Infraestruturas</h3>
                <span id="totalInfra">0</span>
            </div>
        </div>

        <div class="card amarelo">
            <i class="fas fa-bell"></i>
            <div>
                <h3>Alertas</h3>
                <span id="totalAlertas">0</span>
            </div>
        </div>

        <div class="card verde">
            <i class="fas fa-check-circle"></i>
            <div>
                <h3>Status Geral</h3>
                <span id="statusSistema">Normal</span>
            </div>
        </div>

        <div class="card vermelho">
            <i class="fas fa-triangle-exclamation"></i>
            <div>
                <h3>Críticos</h3>
                <span id="totalCriticos">0</span>
            </div>
        </div>

    </section>



    <!-- GRÁFICOS -->
    <section class="graficos">

        <div class="grafico-box">
            <h2>Resumo Operacional</h2>
            <canvas id="graficoBarra"></canvas>
        </div>

        <div class="grafico-box">
            <h2>Status Infraestruturas</h2>
            <canvas id="graficoPizza"></canvas>
        </div>

    </section>



    <!-- TABELA -->
    <section class="tabela-box">

        <div class="titulo-tabela">
            <h2>Últimas Atualizações</h2>
            <span id="horaAtual">00:00:00</span>
        </div>

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Status</th>
                    <th>Nível</th>
                </tr>
            </thead>

            <tbody id="tabelaStatus"></tbody>

        </table>

    </section>

</main>

<!-- JS -->
<script src="dashboard.js"></script>

</body>
</html>
